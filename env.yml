services:
  mariadb:
    image: mariadb:10.6.7
    container_name: mariadb
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_allowed_packet=256M --init-file /data/application/init.sql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=scada
    volumes:
      - mariadb-volume:/var/lib/mysql
      - ./conf/mariadb/conf.d/common.cnf:/etc/mysql/conf.d/common.cnf:ro
      - ./conf/mariadb/conf.d/encryption.cnf:/etc/mysql/conf.d/encryption.cnf:ro
      - ./conf/mariadb/encryption:/etc/mysql/encryption:ro
      - ./conf/mariadb/init/init.sql:/data/application/init.sql:ro
    networks:
      thmi-com:

  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: clickhouse
    restart: always
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-volume:/var/lib/clickhouse
      - ./conf/clickhouse/config.xml:/etc/clickhouse-server/conf.d/config.xml:ro
    networks:
      thmi-com:
        aliases:
          - clickhouse

  mqtt:
    image: library/rabbitmq:3.13-management
    container_name: mqtt
    hostname: mqtt
    restart: always
    volumes:
      - rabbitmq-volume:/var/lib/rabbitmq
      - ./conf/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./conf/rabbitmq/rabbitmq.plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./conf/rabbitmq/rabbitmq_definitions.json:/etc/rabbitmq/rabbitmq_definitions.json:ro
    networks:
      thmi-com:
        aliases:
          - mqtt
          - mqtt-server

volumes:
  rabbitmq-volume:
    name: rabbitmq-volume
  mariadb-volume:
    name: mariadb-volume
  clickhouse-volume:
    name: clickhouse-volume

networks:
  thmi-com:
    name: thmi-com
